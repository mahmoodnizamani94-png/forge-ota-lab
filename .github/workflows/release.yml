# Forge OTA Lab — Release Workflow
#
# Triggers on tag push matching v*.*.* (e.g., v0.1.0, v1.0.0).
# Builds release APK + AAB, creates GitHub Release with artifacts.
#
# Prerequisites:
#   Repository secrets configured:
#     FORGE_KEYSTORE_BASE64  — base64-encoded keystore file
#     FORGE_KEYSTORE_PASSWORD
#     FORGE_KEY_ALIAS
#     FORGE_KEY_PASSWORD

name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4096m

jobs:
  # ===========================================================================
  # CI Gate — full validation before release
  # ===========================================================================
  ci-gate:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  # ===========================================================================
  # Build Release
  # ===========================================================================
  build-release:
    name: Build Release
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [ci-gate]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add Android Rust targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core-extractor-rs -> target

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        run: |
          echo "${{ secrets.FORGE_KEYSTORE_BASE64 }}" | base64 -d > $GITHUB_WORKSPACE/release.keystore
        env:
          FORGE_KEYSTORE_BASE64: ${{ secrets.FORGE_KEYSTORE_BASE64 }}

      - name: Build release APK + AAB
        run: |
          ./gradlew assembleRelease bundleRelease \
            -PFORGE_KEYSTORE_PATH=$GITHUB_WORKSPACE/release.keystore \
            -PFORGE_KEYSTORE_PASSWORD=${{ secrets.FORGE_KEYSTORE_PASSWORD }} \
            -PFORGE_KEY_ALIAS=${{ secrets.FORGE_KEY_ALIAS }} \
            -PFORGE_KEY_PASSWORD=${{ secrets.FORGE_KEY_PASSWORD }}

      - name: Record binary size
        id: size
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          APK_SIZE_BYTES=$(stat -c%s "$APK_PATH")
          APK_SIZE_MB=$((APK_SIZE_BYTES / 1048576))
          echo "apk_size_mb=${APK_SIZE_MB}" >> $GITHUB_OUTPUT
          echo "apk_path=${APK_PATH}" >> $GITHUB_OUTPUT

          AAB_PATH=$(find app/build/outputs/bundle/release -name "*.aab" | head -1)
          AAB_SIZE_BYTES=$(stat -c%s "$AAB_PATH")
          AAB_SIZE_MB=$((AAB_SIZE_BYTES / 1048576))
          echo "aab_size_mb=${AAB_SIZE_MB}" >> $GITHUB_OUTPUT
          echo "aab_path=${AAB_PATH}" >> $GITHUB_OUTPUT

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Forge OTA Lab ${{ steps.version.outputs.version }}"
          body: |
            ## Forge OTA Lab ${{ steps.version.outputs.version }}

            ### Binary Size
            | Artifact | Size |
            |----------|------|
            | APK | ${{ steps.size.outputs.apk_size_mb }} MB |
            | AAB | ${{ steps.size.outputs.aab_size_mb }} MB |

            ### Installation
            Download the APK below for direct installation, or upload the AAB to Google Play Console.

            ### What's New
            See [release notes](store/release-notes/) for details.
          files: |
            ${{ steps.size.outputs.apk_path }}
            ${{ steps.size.outputs.aab_path }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}

      - name: Cleanup keystore
        if: always()
        run: rm -f $GITHUB_WORKSPACE/release.keystore
